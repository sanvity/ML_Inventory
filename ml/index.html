<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f9f8f6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161412" media="(prefers-color-scheme: dark)" />
    <title>ML Playground — No-Code Machine Learning</title>
    <meta name="description" content="ML Playground: go from raw data to trained model in three guided steps. No coding required." />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=optional" rel="stylesheet" />

    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />

    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            },
            colors: {
              base:    'var(--bg-base)',
              surface: 'var(--bg-surface)',
              raised:  'var(--bg-raised)',
              overlay: 'var(--bg-overlay)',
              border:  'var(--border)',
              accent:  { DEFAULT: 'var(--accent)', light: 'var(--accent-light)', bg: 'var(--accent-bg)' },
            },
            animation: {
              'fade-in':      'fadeIn 0.25s ease',
              'slide-in':     'slideIn 0.28s cubic-bezier(0.22,1,0.36,1)',
              'slide-up':     'slideUp 0.25s ease',
              'pulse-slow':   'pulse 2.5s cubic-bezier(0.4,0,0.6,1) infinite',
            },
            keyframes: {
              fadeIn:  { from: { opacity: '0' },           to: { opacity: '1' } },
              slideIn: { from: { transform: 'translateX(100%)' }, to: { transform: 'translateX(0)' } },
              slideUp: { from: { opacity: '0', transform: 'translateY(10px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            },
          },
        },
      };
    </script>
  </head>
  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
